# Varys tag library
#
# This file is the single source of truth for all cell tags.
# The backend reads it when auto-tagging; the frontend BUILT_IN_TAG_DEFS
# mirrors these values for display purposes.
#
# Fields per tag:
#   value        — the tag string written to cell.metadata.tags
#   topic        — grouping label shown in the Tags Panel
#   description  — one-liner used in the LLM prompt
#   llm_eligible — false = never suggested by LLM (human-only judgements)
#                  omitted / true = LLM may suggest this tag
#
# max_suggestions: maximum number of tags the LLM may return per cell

max_suggestions: 3

tags:

  # ── ML Pipeline ────────────────────────────────────────────────────────────
  - value: data-loading
    topic: ML Pipeline
    description: Cells that load data from files, databases, or APIs.

  - value: preprocessing
    topic: ML Pipeline
    description: Data cleaning, normalization, and transformation steps.

  - value: feature-engineering
    topic: ML Pipeline
    description: Feature creation, selection, and encoding.

  - value: training
    topic: ML Pipeline
    description: Model training and fitting.

  - value: evaluation
    topic: ML Pipeline
    description: Metrics, validation, and model assessment.

  - value: inference
    topic: ML Pipeline
    description: Prediction or scoring on new data.

  # ── Quality ────────────────────────────────────────────────────────────────
  - value: todo
    topic: Quality
    description: Cell needs attention or further work.

  - value: reviewed
    topic: Quality
    description: Cell has been reviewed and approved.
    llm_eligible: false

  - value: needs-refactor
    topic: Quality
    description: Works but the implementation should be improved.

  - value: slow
    topic: Quality
    description: Computationally slow — candidate for optimization.

  - value: broken
    topic: Quality
    description: Cell is broken or produces errors.

  - value: tested
    topic: Quality
    description: Cell has been verified to produce correct output.
    llm_eligible: false

  # ── Report ─────────────────────────────────────────────────────────────────
  - value: report
    topic: Report
    description: Output to include in an exported report.

  - value: figure
    topic: Report
    description: Cell that generates a figure or chart.

  - value: table
    topic: Report
    description: Cell that generates a table.

  - value: key-finding
    topic: Report
    description: Contains an important result or insight.

  - value: report-exclude
    topic: Report
    description: Explicitly exclude from report output.

  # ── Status ─────────────────────────────────────────────────────────────────
  - value: draft
    topic: Status
    description: Work in progress — not finalised.

  - value: stable
    topic: Status
    description: Unlikely to change; safe dependency for other cells.
    llm_eligible: false

  - value: deprecated
    topic: Status
    description: No longer needed; kept for reference.
    llm_eligible: false

  - value: sensitive
    topic: Status
    description: Contains sensitive data, credentials, or PII.
    llm_eligible: false
