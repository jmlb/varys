# Inline / multiline completion configuration
#
# Copy this file to  <notebook_dir>/.jupyter-assistant/config/completion.cfg
# and edit as needed.  All values shown below are the built-in defaults.

[context]
# Number of previously executed cells to include as context for completions
prev_cells = 5

# Maximum characters of source included per cell in the completion context
cell_source_limit = 800

# Minimum number of non-whitespace characters required before triggering completion
min_prefix_length = 2

[cache]
# Maximum number of completions held in the LRU cache
max_size = 100

# Cache TTL in seconds (default: 1 hour).
# Set to 0 to disable caching.
ttl = 3600

[tokens]
# Maximum tokens the LLM may generate for an inline (single-line) completion
inline_max_tokens = 128

# Maximum tokens the LLM may generate for a multiline completion
multiline_max_tokens = 512
