# RAG (Retrieval-Augmented Generation) configuration
#
# Copy this file to  <notebook_dir>/.jupyter-assistant/config/rag.cfg
# and edit as needed.  All values shown below are the built-in defaults.

[chunking]
# Maximum characters per text chunk before splitting
chunk_size = 512

# Character overlap between consecutive chunks (prevents context loss at boundaries)
chunk_overlap = 64

# Maximum characters to include from a cell's output (keeps prompts lean)
max_cell_output = 400

# Comma-separated list of file extensions that can be indexed
# Add .rst, .html, .csv etc. as needed
supported_extensions = .ipynb,.md,.markdown,.txt,.pdf,.py

[retrieval]
# Number of chunks returned per /ask query
top_k = 5

# Vector distance metric used by ChromaDB: cosine | l2 | ip
distance_metric = cosine

# ChromaDB collection name (change if sharing a ChromaDB instance across tools)
collection_name = ds_assistant_knowledge

[embedding]
# Batch size for sentence-transformers embedding (lower on low-RAM machines)
embed_batch_size = 32

# HTTP timeout for Ollama embedding requests (seconds)
ollama_embed_timeout = 30

# HTTP timeout for OpenAI / Azure embedding requests (seconds)
openai_embed_timeout = 60

[models]
# Default embedding model per provider.
# These are overridden by the corresponding .env variables:
#   OLLAMA_EMBED_MODEL, OPENAI_EMBED_MODEL, GOOGLE_EMBED_MODEL,
#   AZURE_EMBED_MODEL, DS_ST_EMBED_MODEL
ollama_embed_model              = nomic-embed-text
openai_embed_model              = text-embedding-3-small
google_embed_model              = text-embedding-004
azure_embed_model               = text-embedding-3-small
sentence_transformer_model      = all-MiniLM-L6-v2
