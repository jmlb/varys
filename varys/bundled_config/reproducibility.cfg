# Reproducibility Guardian configuration
#
# Copy this file to  <notebook_dir>/.jupyter-assistant/config/reproducibility.cfg
# and edit as needed.  All values shown below are the built-in defaults.

[seeds]
# Integer seed injected into auto-fix suggestions (e.g. random_state=42)
default_seed = 42

[paths]
# Comma-separated path prefixes that are flagged as non-portable absolute paths.
# Add /data/, /workspace/, /opt/ etc. for Docker / cloud environments.
abs_path_prefixes = /home/,/Users/,/root/,/tmp/,/data/,/mnt/,/workspace/,/opt/,/srv/

[estimators]
# Comma-separated sklearn-compatible estimator names that require random_state.
# Add XGBoost, LightGBM, CatBoost, custom estimators etc. as needed.
stochastic_estimators =
    RandomForestClassifier,RandomForestRegressor,
    ExtraTreesClassifier,ExtraTreesRegressor,
    GradientBoostingClassifier,GradientBoostingRegressor,
    HistGradientBoostingClassifier,HistGradientBoostingRegressor,
    BaggingClassifier,BaggingRegressor,
    AdaBoostClassifier,AdaBoostRegressor,
    SGDClassifier,SGDRegressor,
    LogisticRegression,
    KMeans,MiniBatchKMeans,
    ShuffleSplit,StratifiedShuffleSplit,
    cross_val_score,
    XGBClassifier,XGBRegressor,
    LGBMClassifier,LGBMRegressor,
    CatBoostClassifier,CatBoostRegressor
