# LLM configuration
#
# Copy this file to  <notebook_dir>/.jupyter-assistant/config/llm.cfg
# and edit as needed.  All values shown below are the built-in defaults.

[context]
# Maximum characters contributed by each cell to the LLM prompt.
# Increase for notebooks with large, complex cells; decrease for faster/cheaper calls.
cell_content_limit = 2000

# Maximum characters of a focused output (image alt-text / table) sent to the LLM
selected_output_limit = 2000

[retry]
# Number of automatic retries on transient API errors (rate-limit, 529, etc.)
max_retries = 3

# Base delay between retries in seconds (exponential backoff: delay * 2^attempt)
retry_base_delay = 2.0

[defaults]
# Fallback cell insertion mode when no loaded skill specifies one.
# Options: preview (show diff + Accept/Undo) | auto (apply immediately) | chat
default_cell_mode = preview

[ollama]
# HTTP timeout for planning / chat requests (seconds)
timeout_chat = 120

# HTTP timeout for code completions (seconds)
timeout_completion = 30

# How long to keep the model loaded in GPU/CPU memory between requests
# Format: Ollama duration string — e.g. 5m, 30m, 1h, -1 (forever)
keep_alive = 30m
